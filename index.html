<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess Pro - Professional Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #2e2e2e; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 10px; padding-bottom: 80px; }
  
  h1 { margin: 5px 0; color: #e0c97f; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
  
  #status-bar { width: 100%; max-width: 450px; background: #1e1e1e; padding: 10px; text-align: center; border: 1px solid #444; border-radius: 5px; margin-bottom: 10px; font-weight: bold; color: #e0c97f; }
  #feedback { height: 25px; line-height: 25px; font-weight: bold; color: #e74c3c; margin-bottom: 5px; text-align: center; }

  .settings-row { width: 100%; max-width: 450px; display: flex; gap: 8px; margin-bottom: 10px; }
  select { flex: 1; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 0.8rem; }

  /* STRICT PERFECT SQUARE BOARD */
  #board-container { width: 95vw; max-width: 450px; aspect-ratio: 1/1; border: 5px solid #5d4037; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; height: 100%; }
  
  .square { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .square.light { background: #f0d9b5; }
  .square.dark { background: #b58863; }
  .square.selected::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(123, 97, 255, 0.5); z-index: 2; }
  .square.last-move::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(245, 246, 130, 0.5); z-index: 1; }
  
  /* Absolute positioning stops the board from shifting */
  .piece { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 9vw; cursor: pointer; user-select: none; z-index: 5; }
  @media (min-width: 450px) { .piece { font-size: 42px; } }
  .white-piece { color: #fff; text-shadow: 0 0 2px #000; }
  .black-piece { color: #000; }

  #controls { display: flex; gap: 8px; width: 100%; max-width: 450px; margin-top: 10px; }
  #controls button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
  #btn-hint { background: #3498db; }
  #btn-undo { background: #f39c12; }
  #btn-new { background: #e74c3c; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #444; z-index: 100; }
  .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; font-size: 0.65rem; gap: 4px; }
  .nav-item.active { color: #e0c97f; }
  .nav-icon { font-size: 1.3rem; }

  #puzzle-menu { display:none; position:fixed; top:20%; left:5%; width:90%; max-width:400px; background:#1e1e1e; padding:20px; z-index:200; border:2px solid #e0c97f; border-radius:10px; text-align:center; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  .menu-btn { display:block; width:100%; padding:12px; margin:8px 0; border:none; border-radius:5px; background:#333; color:white; font-weight:bold; cursor:pointer; }
  .menu-btn.close { background:#555; margin-top:15px; }
</style>
</head>
<body>

<h1>♟ CHESS PRO</h1>
<div id="status-bar"><span id="turn-indicator">White to move</span></div>
<div id="feedback"></div>

<div class="settings-row" id="game-settings">
  <select id="game-mode">
    <option value="ai">Vs Computer</option>
    <option value="pvp">Two Players</option>
  </select>
  <select id="difficulty">
    <option value="1">Lvl 1 (500 ELO)</option>
    <option value="5" selected>Lvl 2 (1400 ELO)</option>
    <option value="10">Lvl 3 (1700 ELO)</option>
  </select>
</div>

<div id="board-container"><div id="board"></div></div>

<div id="controls">
  <button id="btn-hint" onclick="getHint()">HINT</button>
  <button id="btn-undo" onclick="undoMove()">UNDO</button>
  <button id="btn-new" onclick="startNewGame()">NEW GAME</button>
  <button id="btn-create" onclick="createRoom()" style="background:#27ae60;">CREATE</button>
  <button id="btn-join" onclick="joinRoom()" style="background:#2980b9;">JOIN</button>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="showMainGame()"><span class="nav-icon">🏠</span><span>Home</span></div>
  <div class="nav-item" onclick="showMainGame()"><span class="nav-icon">🎮</span><span>Games</span></div>
  <div class="nav-item" onclick="alert('Lessons coming soon!')"><span class="nav-icon">📖</span><span>Lessons</span></div>
  <div class="nav-item" onclick="alert('Courses coming soon!')"><span class="nav-icon">🎓</span><span>Courses</span></div>
  <div class="nav-item" onclick="togglePuzzleMenu()"><span class="nav-icon">🧩</span><span>Puzzles</span></div>
</nav>
<div id="puzzle-menu">
  <h3 style="color:#e0c97f; margin-bottom:10px;">Select Category</h3>
  <button class="menu-btn" onclick="loadPuzzle('opening')">Opening</button>
  <button class="menu-btn" onclick="loadPuzzle('middlegame')">Middlegame</button>
  <button class="menu-btn" onclick="loadPuzzle('endgame')">Endgame</button>
  <button class="menu-btn close" onclick="togglePuzzleMenu()">CLOSE</button>
</div>

<script>
  console.log("Script is loading!");

  const game = new Chess();
  const PIECES = { 
    'w': { 'k':'♔', 'q':'♕', 'r':'♖', 'b':'♗', 'n':'♘', 'p':'♙' }, 
    'b': { 'k':'♚', 'q':'♛', 'r':'♜', 'b':'♝', 'n':'♞', 'p':'♟' } 
  };
  
  let selectedSquare = null;
  let isPuzzleMode = false;
  let currentSolution = [];
  let puzzleData = null;
  let currentPuzzleTheme = 'middlegame';
  let lastFrom = null, lastTo = null;
  let isAiThinking = false;
  let boardFlipped = false;
  let engine = null;

  try { 
    engine = new Worker("stockfish.js"); 
    engine.postMessage("uci"); 
  } catch(e) { console.error("Stockfish failed to load"); }

  fetch('my_puzzles.json').then(res => res.json()).then(data => { puzzleData = data; });

  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    const columns = 'abcdefgh';
    const ranks = boardFlipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
    const files = boardFlipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

    for(let r of ranks) {
      for(let f of files) {
        const sqName = columns[f] + r;
        const sqDiv = document.createElement('div');
        sqDiv.className = `square ${(r + f) % 2 !== 0 ? 'dark' : 'light'}`;
        if (sqName === selectedSquare) sqDiv.classList.add('selected');
        if (sqName === lastFrom || sqName === lastTo) sqDiv.classList.add('last-move');
        sqDiv.onclick = () => handleSquareClick(sqName);
        const piece = game.get(sqName);
        if (piece) {
          const span = document.createElement('span');
          span.className = `piece ${piece.color === 'w' ? 'white-piece' : 'black-piece'}`;
          span.textContent = PIECES[piece.color][piece.type];
          sqDiv.appendChild(span);
        }
        boardEl.appendChild(sqDiv);
      }
    }
    updateStatus();
  }

  function updateStatus() {
    const indicator = document.getElementById('turn-indicator');
    if (game.in_checkmate()) indicator.textContent = "Checkmate! Game Over.";
    else if (game.in_draw()) indicator.textContent = "Draw!";
    else if (game.in_check()) indicator.textContent = "Check!";
    else if (!isPuzzleMode) indicator.textContent = game.turn() === 'w' ? "White to move" : "Black to move";
  }

  function handleSquareClick(sq) {
    if (isAiThinking || game.game_over()) return;
    const feedback = document.getElementById('feedback');
    feedback.textContent = "";

    if (selectedSquare) {
      if (isPuzzleMode) {
        let attemptedMove = selectedSquare + sq;
        let correctMove = currentSolution[0];
        if (correctMove && correctMove.startsWith(attemptedMove)) {
          game.move({ from: selectedSquare, to: sq, promotion: correctMove.length > 4 ? correctMove[4] : 'q' });
          lastFrom = selectedSquare; lastTo = sq;
          currentSolution.shift();
          if (currentSolution.length > 0) {
            setTimeout(() => {
              const aiMove = currentSolution.shift();
              game.move({ from: aiMove.substring(0,2), to: aiMove.substring(2,4), promotion: aiMove.length > 4 ? aiMove[4] : 'q' });
              lastFrom = aiMove.substring(0,2); lastTo = aiMove.substring(2,4);
              renderBoard();
              if (currentSolution.length === 0) feedback.textContent = "Puzzle Solved! 🎉";
            }, 400);
          } else { feedback.textContent = "Puzzle Solved! 🎉"; }
        } else {
          feedback.textContent = "WRONG MOVE! Try again.";
          document.getElementById('board-container').style.borderColor = "#e74c3c";
          setTimeout(() => document.getElementById('board-container').style.borderColor = "#5d4037", 300);
        }
      } else {
        const move = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
        if (move) {
          lastFrom = selectedSquare; lastTo = sq;
          if (myRoomID) {
              socket.emit('make-move', { roomID: myRoomID, move: { from: selectedSquare, to: sq } });
          }
          if (document.getElementById('game-mode').value === 'ai' && !game.game_over()) {
            triggerAi();
          }
        }
      }
      selectedSquare = null;
      renderBoard();
    } else {
      const piece = game.get(sq);
      if (piece && piece.color === game.turn()) {
        selectedSquare = sq;
        renderBoard();
      }
    }
  }

  function triggerAi() {
    if (!engine) return;
    isAiThinking = true;
    document.getElementById('turn-indicator').textContent = "Computer is thinking...";
    engine.postMessage("position fen " + game.fen());
    engine.postMessage("go depth " + document.getElementById('difficulty').value);
  }

  if (engine) {
    engine.onmessage = (e) => {
      const msg = e.data;
      if (msg.startsWith("bestmove")) {
        const moveStr = msg.split(" ")[1];
        if (moveStr && isAiThinking) {
          game.move({ from: moveStr.substring(0,2), to: moveStr.substring(2,4), promotion: moveStr[4] || 'q' });
          lastFrom = moveStr.substring(0,2); lastTo = moveStr.substring(2,4);
          isAiThinking = false;
          renderBoard();
        } else if (moveStr && !isAiThinking) {
           alert("Recommended Move: " + moveStr.substring(0,2) + " to " + moveStr.substring(2,4));
        }
      }
    };
  }

  window.getHint = () => {
    if (isPuzzleMode) {
      if (currentSolution.length > 0) {
        let m = currentSolution[0];
        alert("Hint: The best move is " + m.substring(0,2) + " to " + m.substring(2,4));
      }
    } else {
      if (game.game_over() || !engine) return;
      engine.postMessage("position fen " + game.fen());
      engine.postMessage("go depth 5");
    }
  };

  window.showMainGame = () => {
    isPuzzleMode = false;
    boardFlipped = false;
    document.getElementById('game-settings').style.display = 'flex';
    document.getElementById('btn-new').textContent = "NEW GAME";
    document.getElementById('feedback').textContent = "";
    game.reset();
    lastFrom = null; lastTo = null;
    renderBoard();
  };

  window.togglePuzzleMenu = () => {
    const menu = document.getElementById('puzzle-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  };

  window.loadPuzzle = (theme) => {
    currentPuzzleTheme = theme || currentPuzzleTheme;
    if (!puzzleData || !puzzleData[currentPuzzleTheme]) return alert("Loading puzzles...");
    isPuzzleMode = true;
    togglePuzzleMenu();
    document.getElementById('game-settings').style.display = 'none';
    document.getElementById('btn-new').textContent = "NEXT PUZZLE";
    document.getElementById('feedback').textContent = "";
    const list = puzzleData[currentPuzzleTheme];
    const p = list[Math.floor(Math.random() * list.length)];
    game.load(p.FEN);
    currentSolution = p.Moves.split(" ");
    let oppMove = currentSolution.shift();
    game.move({ from: oppMove.substring(0,2), to: oppMove.substring(2,4), promotion: oppMove.length > 4 ? oppMove[4] : 'q' });
    lastFrom = oppMove.substring(0,2); lastTo = oppMove.substring(2,4);
    boardFlipped = (game.turn() === 'b');
    document.getElementById('turn-indicator').textContent = `Puzzle: ${currentPuzzleTheme.toUpperCase()}`;
    renderBoard();
  };

  window.undoMove = () => {
    if (isPuzzleMode) return; 
    game.undo(); 
    if (document.getElementById('game-mode').value === 'ai') game.undo();
    lastFrom = null; lastTo = null;
    renderBoard();
  };

  window.startNewGame = () => {
    if (isPuzzleMode) {
       loadPuzzle(currentPuzzleTheme);
    } else {
       game.reset();
       lastFrom = null; lastTo = null;
       renderBoard();
    }
  };

  renderBoard();
  
  const socket = io("https://chess-backend-production-8d99.up.railway.app");
  let myRoomID = null;

  function createRoom() {
      myRoomID = Math.random().toString(36).substring(7);
      socket.emit('join-room', myRoomID);
      alert("Share this Room ID with your friend: " + myRoomID);
  }

  function joinRoom() {
      myRoomID = prompt("Enter the Room ID:");
      if (myRoomID) {
          socket.emit('join-room', myRoomID);
          alert("Joined room: " + myRoomID);
      }
  }

  socket.on('receive-move', (move) => {
      game.move({ from: move.from, to: move.to, promotion: 'q' });
      lastFrom = move.from;
      lastTo = move.to;
      renderBoard();
  });
</script>
</body>
</html>
